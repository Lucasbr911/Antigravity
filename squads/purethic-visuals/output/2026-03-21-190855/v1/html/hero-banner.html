<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 800px;
      overflow: hidden;
      background: #FAFAF8;
      display: flex;
      font-family: 'Inter', sans-serif;
    }

    .left-panel {
      width: 54%;
      height: 100%;
      background: linear-gradient(150deg, #FFFFF0 0%, #FDF5F5 55%, #FADADD 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 100px 110px;
      position: relative;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #B2AC88;
      margin-bottom: 28px;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 96px;
      font-weight: 300;
      color: #2C2C2C;
      line-height: 1.05;
      margin-bottom: 36px;
    }

    .headline em {
      font-style: italic;
      color: #B2AC88;
    }

    .subline {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: #7A7A72;
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 52px;
      letter-spacing: 0.02em;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2C2C2C;
    }

    .cta-line {
      width: 52px;
      height: 1px;
      background: #B2AC88;
    }

    .decorative-dot {
      position: absolute;
      bottom: 60px;
      left: 110px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #B2AC88;
    }

    .right-panel {
      width: 46%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, #C4A882 0%, #B2AC88 40%, #9E9B7A 100%);
    }

    .blob-1 {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 62% 38% 46% 54% / 60% 44% 56% 40%;
      background: rgba(255, 255, 240, 0.14);
      top: -180px;
      right: -200px;
    }

    .blob-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 38% 62% 70% 30% / 40% 50% 50% 60%;
      background: rgba(250, 218, 221, 0.18);
      bottom: -60px;
      left: 60px;
    }

    .center-composition {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-circle {
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: rgba(255, 255, 240, 0.12);
      border: 1px solid rgba(255, 255, 240, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .product-circle::before {
      content: '';
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 240, 0.2);
    }

    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 255, 240, 0.85);
    }

    .right-tag {
      position: absolute;
      bottom: 52px;
      right: 52px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 240, 0.55);
    }
  </style>
</head>
<body>
  <div class="left-panel">
    <div class="eyebrow">Conscious Beauty · UK</div>
    <div class="headline">Curated Beauty.<br><em>Uncompromising</em><br>Results.</div>
    <div class="subline">A sanctuary of ethical skincare and professional rituals for the modern, conscious soul.</div>
    <div class="cta">
      <div class="cta-line"></div>
      Explore the Collection
    </div>
    <div class="decorative-dot"></div>
  </div>

  <div class="right-panel">
    <div class="bg-layer"></div>
    <div class="blob-1"></div>
    <div class="blob-2"></div>
    <div class="center-composition">
      <div class="product-circle">
        <div class="logo-text">Purethic</div>
      </div>
    </div>
    <div class="right-tag">purethiclab.com</div>
  </div>
</body>
</html>
